# NOTE: demo only — plaintext secret for local development
# In production replace with SealedSecret:
# kubectl create secret generic postgres-secret --from-literal=password=<op read "op://vault/postgres/password"> \
#   --dry-run=client -o yaml | kubeseal --cert <env>-pub.pem --format yaml > postgres-sealed-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: demo
type: Opaque
stringData:
  password: demo-password
