apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: demo-app
    ports:
    - protocol: TCP
      port: 5432
  - from:
    - podSelector:
        matchExpressions:
        - key: job-name
          operator: In
          values:
          - demo-app-db-bootstrap
          - demo-app-migration
    ports:
    - protocol: TCP
      port: 5432
