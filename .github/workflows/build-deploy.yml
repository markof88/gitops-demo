name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/demo-app:${{ github.sha }}
            ghcr.io/${{ github.repository }}/demo-app:latest

      - name: Install kustomize
        run: |
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz"
          tar -xzf kustomize_v5.4.1_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag
        run: |
          cd apps/demo-app/overlays/dev
          kustomize edit set image demo-app=ghcr.io/${{ github.repository }}/demo-app:${{ github.sha }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/demo-app/overlays/dev/kustomization.yaml
          git commit -m "deploy: update demo-app to ${{ github.sha }}"
          git push
